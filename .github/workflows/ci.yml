name: Manong API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build App
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: 22
          script: |
            # Ensure folder is clean and clone if necessary
            if [ ! -d "/root/manong-api/.git" ]; then
              rm -rf /root/manong-api
              git clone https://github.com/manongapplication/manong-api.git /root/manong-api
            fi
            
            cd /root/manong-api
            git reset --hard
            git pull origin main

            # Install dependencies
            if [ ! -f "package-lock.json" ]; then
              npm install
            else
              npm ci
            fi

            # Generate Prisma Client
            npx prisma generate --schema=prisma/schema.prisma

            # Build
            npm run build

            # More aggressive port cleanup
            echo "🔍 Checking for processes on port 3000..."
            
            # Method 1: Find and kill using lsof
            lsof -ti:3000 | xargs kill -9 2>/dev/null || true
            
            # Method 2: Using fuser (more aggressive)
            fuser -k 3000/tcp 2>/dev/null || true
            
            # Method 3: Kill all node processes related to the app (optional - be careful with this)
            # pkill -f "manong-api" || true
            
            # Wait for port to be completely released
            echo "⏳ Waiting for port 3000 to be released..."
            sleep 5
            
            # Verify port is free
            if lsof -i:3000 > /dev/null 2>&1; then
              echo "❌ Port 3000 is still in use! Forcing cleanup..."
              kill -9 $(lsof -t -i:3000) 2>/dev/null || true
              sleep 3
            else
              echo "✅ Port 3000 is free"
            fi

            # Stop and delete the existing PM2 process
            echo "🔄 Stopping PM2 process..."
            pm2 stop manong-api 2>/dev/null || true
            pm2 delete manong-api 2>/dev/null || true
            
            # Clear PM2 logs (optional)
            pm2 flush manong-api 2>/dev/null || true
            
            # Start with ecosystem.config.js
            echo "🚀 Starting application..."
            pm2 start ecosystem.config.js --update-env
            
            # Save PM2 process list
            pm2 save
            
            # Display status
            echo "📊 PM2 Status:"
            pm2 status
            
            # Show recent logs
            echo "📝 Recent logs:"
            pm2 logs manong-api --lines 20 --nostream