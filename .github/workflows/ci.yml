name: Manong API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build App
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: 22
          script: |
            # Ensure folder is clean and clone if necessary
            if [ ! -d "/root/manong-api/.git" ]; then
              rm -rf /root/manong-api
              git clone https://github.com/manongapplication/manong-api.git /root/manong-api
            fi
            
            cd /root/manong-api
            git reset --hard
            git pull origin main

            # Install dependencies
            if [ ! -f "package-lock.json" ]; then
              npm install
            else
              npm ci
            fi

            # Generate Prisma Client
            npx prisma generate --schema=prisma/schema.prisma

            # Build
            npm run build

            # STOP ALL OTHER PM2 APPS THAT MIGHT USE PORT 3000
            echo "🔍 Checking for other apps using port 3000..."
            
            # Get all PM2 apps and stop any that might conflict
            pm2 stop manong-a 2>/dev/null || true
            pm2 delete manong-a 2>/dev/null || true
            
            # Also check for any other Node processes on port 3000
            lsof -ti:3000 | xargs kill -9 2>/dev/null || true
            
            # Now handle your main app
            pm2 stop manong-api 2>/dev/null || true
            pm2 delete manong-api 2>/dev/null || true
            
            # Wait a moment
            sleep 3
            
            # Start your app
            pm2 start ecosystem.config.js --update-env
            pm2 save
            pm2 status